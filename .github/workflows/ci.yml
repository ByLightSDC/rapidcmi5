name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:  # Allow manual triggering

jobs:
  install:
    name: Install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for nx affected to compare branches

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache node_modules
        id: cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [install]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: Lint (affected)
        if: github.event_name == 'pull_request'
        run: npx nx affected --target=lint --base=origin/${{ github.base_ref }} --head=HEAD --parallel=3
        continue-on-error: true

      - name: Lint (all)
        if: github.event_name != 'pull_request'
        run: npx nx run-many --target=lint --all --parallel=3
        continue-on-error: true

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [install]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: Test (affected)
        if: github.event_name == 'pull_request'
        run: npx nx affected --target=test --base=origin/${{ github.base_ref }} --head=HEAD --parallel=3 --coverage

      - name: Test (all)
        if: github.event_name != 'pull_request'
        run: npx nx run-many --target=test --all --parallel=3 --coverage

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: Build (affected)
        if: github.event_name == 'pull_request'
        run: npx nx affected --target=build --base=origin/${{ github.base_ref }} --head=HEAD --parallel=3

      - name: Build (all)
        if: github.event_name != 'pull_request'
        run: npx nx run-many --target=build --all --parallel=3
